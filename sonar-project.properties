# Unique project identifier
sonar.projectKey=synapse-md-web-ui
sonar.projectName=Synapse MD Web UI
sonar.projectVersion=1.0

# Path to the source code (relative to this file)
sonar.sources=src
# Exclusions
sonar.exclusions=**/node_modules/**,**/*.spec.ts,src/environments/**

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Type of language
sonar.language=ts

# Use custom tsconfig for scanner compatibility (resolves moduleResolution: bundler issue)
sonar.typescript.tsconfigPath=tsconfig.sonar.json

