  <!-- Custom User Permissions Editor View -->
  <div *ngIf="activeTab === 'permissions'" class="permissions-editor glass-panel animate-fade-in">
    <div class="stepper-header  d-flex justify-content-between align-items-center">
      <div>
        <h2 class="stepper-title">Custom Permissions: {{ selectedUserForPermissions?.name ||
          selectedUserForPermissions?.email }}</h2>
        <p class="text-muted text-sm">Configure individual screen permission overrides. Checked actions are explicitly
          allowed for this user.</p>
      </div>
      <button class="btn btn-secondary btn-sm" (click)="switchTab('list')">
        <span class="material-icons btn-icon-main">close</span>
      </button>
    </div>

    <div class="module-quick-select mb-12">
      <span class="quick-select-label font-bold">Modules Quick Selection:</span>
      <div class="quick-select-chips">
        <div class="quick-select-chip" *ngFor="let mod of modules">
          <input type="checkbox" [id]="'quick-select-' + mod.id" [checked]="isModuleAllSelected(mod.id)"
            [indeterminate]="isModulePartiallySelected(mod.id)" (change)="toggleAllForModule(mod.id); refreshGrid()">
          <label [for]="'quick-select-' + mod.id">{{ mod.name }}</label>
        </div>
      </div>
    </div>

    <div class="permissions-matrix-grid">
      <ag-grid-angular #agGrid style="width: 100%; height: calc(100vh - 350px);"
        class="ag-theme-quartz permissions-grid-ag" [defaultColDef]="gridDefaultColDef" [columnDefs]="gridColumnDefs"
        [rowData]="gridRowData" [gridOptions]="gridOptions" [autoGroupColumnDef]="autoGroupColumnDef"
        [context]="gridContext" (gridReady)="onPermissionsGridReady($event)">
      </ag-grid-angular>
    </div>

    <div class="stepper-footer mt-16 p-16 d-flex justify-content-between align-items-center">
      <button type="button" class="btn btn-secondary" (click)="switchTab('list')">
        <span class="material-icons btn-icon-main">close</span> Cancel
      </button>

      <button type="button" class="btn btn-primary" [disabled]="saving" (click)="saveCustomPermissions()">
        <span *ngIf="!saving" class="material-icons btn-icon-main">save</span>
        <span *ngIf="!saving">Save Custom Permissions</span>
        <span *ngIf="saving">Saving Permissions...</span>
      </button>
    </div>
  </div>
</div>
