<div class="reset-container">
  <div class="glass-panel animate-fade-in">
    
    <div *ngIf="!success">
      <div class="brand-header">
        <h2>Reset Password</h2>
        <p>Enter your email to request a reset link</p>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" formControlName="email" class="form-input" placeholder="e.g. yourname@domain.com">
        </div>

        <button type="submit" [disabled]="resetForm.invalid || loading" class="btn-primary" style="margin-top: 1rem;">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading">Sending request...</span>
        </button>
      </form>

      <div style="margin-top: 2rem; text-align: center; font-size: 0.88rem; color: var(--text-muted);">
        Remember your password? <a routerLink="/iam/login" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Log in</a>
      </div>
    </div>

    <!-- Success state -->
    <div *ngIf="success" class="success-state animate-fade-in">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-4.8a2 2 0 012.22 0l8 4.8A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
        </svg>
      </div>
      <h2 class="gradient-text">Reset Link Requested!</h2>
      <p style="color: var(--text-muted); margin: 1rem 0 2rem;">
        If your email is registered, we have sent a password reset link to <strong>{{ resetForm.value.email }}</strong>. 
        Please check your inbox (or use the simulated Admin Mailbox in the dashboard).
      </p>
      <button routerLink="/iam/login" class="btn-primary">Back to Login</button>
    </div>

  </div>
</div>
