<div class="mfa-container">
  <div class="glass-panel animate-fade-in">
    
    <div class="brand-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--primary-color); margin-bottom: 1rem;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
      <h2>MFA Verification</h2>
      <p>Multi-factor authentication is active on your profile</p>
    </div>

    <div class="otp-box">
      <strong>Developer Notice:</strong> Enter <strong>123456</strong> as the OTP code to simulate a valid verification.
    </div>

    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="mfaForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="code">6-Digit Verification Code</label>
        <input type="text" id="code" formControlName="code" class="form-input" placeholder="e.g. 123456" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.2em;" autocomplete="one-time-code">
      </div>

      <button type="submit" [disabled]="mfaForm.invalid || loading" class="btn-primary" style="margin-top: 1rem;">
        <span *ngIf="!loading">Verify & Proceed</span>
        <span *ngIf="loading">Verifying code...</span>
      </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.88rem; color: var(--text-muted);">
      <a routerLink="/iam/login" style="color: var(--text-muted); text-decoration: none;">Back to Login</a>
    </div>

  </div>
</div>
